<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Определение города по IP</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="ajax_rest.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
    }
    .city-result {
      background: #f0f8ff;
      border: 1px solid #87ceeb;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
    .city-name {
      font-weight: bold;
      color: #2e8b57;
      font-size: 1.2em;
    }
    .error-message {
      background: #fff0f0;
      border: 1px solid #ff6b6b;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
    details {
      margin-top: 10px;
      background: white;
      padding: 10px;
      border-radius: 4px;
    }
    summary {
      cursor: pointer;
      font-weight: bold;
      color: #4682b4;
    }
  </style>
</head>
<body>
  <h1>Определение города по IP‑адресу</h1>
  <form action="" method="POST">
    <strong>Укажите IP<span class="mf-req">*</span></strong><br>
    <input type="text" name="ip" id="ip" value="" placeholder="Например: 8.8.8.8" style="width: 100%; padding: 8px; margin: 10px 0;"><br>
    <input type="submit" name="submit" id="submit" value="Определить город" style="padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">
  </form>
  <div id="result"></div>
</body>
</html>
